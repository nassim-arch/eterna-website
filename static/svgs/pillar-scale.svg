<svg viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Orbiting circles with connecting lines (static, no spin) -->
  <g>
    <circle cx="80" cy="34" r="10" stroke="white" stroke-width="1.5" fill="none" opacity="0.9"/>
    <circle cx="110" cy="46" r="10" stroke="white" stroke-width="1.5" fill="none" opacity="0.82"/>
    <circle cx="124" cy="74" r="10" stroke="white" stroke-width="1.5" fill="none" opacity="0.74"/>
    <circle cx="108" cy="104" r="10" stroke="white" stroke-width="1.5" fill="none" opacity="0.66"/>
    <circle cx="80" cy="118" r="10" stroke="white" stroke-width="1.5" fill="none" opacity="0.58"/>
    <circle cx="52" cy="104" r="10" stroke="white" stroke-width="1.5" fill="none" opacity="0.5"/>
    <circle cx="36" cy="74" r="10" stroke="white" stroke-width="1.5" fill="none" opacity="0.42"/>
    <circle cx="52" cy="46" r="10" stroke="white" stroke-width="1.5" fill="none" opacity="0.34"/>
    <!-- Connecting lines between adjacent circles -->
    <line x1="80" y1="34" x2="110" y2="46" stroke="white" stroke-width="0.5" opacity="0.15"/>
    <line x1="110" y1="46" x2="124" y2="74" stroke="white" stroke-width="0.5" opacity="0.15"/>
    <line x1="124" y1="74" x2="108" y2="104" stroke="white" stroke-width="0.5" opacity="0.15"/>
    <line x1="108" y1="104" x2="80" y2="118" stroke="white" stroke-width="0.5" opacity="0.15"/>
    <line x1="80" y1="118" x2="52" y2="104" stroke="white" stroke-width="0.5" opacity="0.15"/>
    <line x1="52" y1="104" x2="36" y2="74" stroke="white" stroke-width="0.5" opacity="0.15"/>
    <line x1="36" y1="74" x2="52" y2="46" stroke="white" stroke-width="0.5" opacity="0.15"/>
    <line x1="52" y1="46" x2="80" y2="34" stroke="white" stroke-width="0.5" opacity="0.15"/>
    <!-- Cross-connecting lines -->
    <line x1="80" y1="34" x2="80" y2="118" stroke="white" stroke-width="0.3" opacity="0.08"/>
    <line x1="36" y1="74" x2="124" y2="74" stroke="white" stroke-width="0.3" opacity="0.08"/>
    <line x1="52" y1="46" x2="108" y2="104" stroke="white" stroke-width="0.3" opacity="0.08"/>
    <line x1="110" y1="46" x2="52" y2="104" stroke="white" stroke-width="0.3" opacity="0.08"/>
    <!-- Center circle -->
    <circle cx="80" cy="76" r="6" stroke="white" stroke-width="1.5" fill="none" opacity="0.26"/>
  </g>
</svg>
