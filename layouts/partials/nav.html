<nav>
  <div class="nav-inner">
    <a href="{{ site.Home.RelPermalink }}" class="nav-logo"><img src="{{ "svgs/eterna-logo-full-white.svg" | relURL }}" alt="Eterna Capital"></a>
    <ul class="nav-links" id="navLinks">
      {{ range site.Menus.main }}
      <li><a href="{{ .URL }}"{{ if $.IsMenuCurrent "main" . }} class="active"{{ end }}{{ with .Params.target }} target="{{ . }}" rel="noopener"{{ end }}>{{ .Name }}</a></li>
      {{ end }}
    </ul>
    {{- partial "theme-toggle.html" . -}}
    <button class="nav-toggle" id="navToggleBtn" aria-label="Menu" aria-expanded="false"><span></span><span></span><span></span></button>
  </div>
</nav>
