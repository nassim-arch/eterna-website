<footer>
  <div class="footer-inner">
    <ul class="footer-links">
      {{ range site.Menus.footer }}
      <li><a href="{{ .URL }}"{{ with .Params.target }} target="{{ . }}" rel="noopener"{{ end }}>{{ .Name }}</a></li>
      {{ end }}
    </ul>
    <span class="footer-copy">&copy; {{ now.Year }} Eterna Capital</span>
  </div>
</footer>
